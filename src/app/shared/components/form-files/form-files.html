
<div class="modal-container">
    <div class="modal-header">
        <h2>Generar Archivos</h2>
        <button mat-icon-button (click)="close()" class="close-btn">
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <form [formGroup]="form">
        <div class="form-group">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" formControlName="startDate">
        </div>
        <div class="form-group">
            <label for="endDate">End Date</label>
            <input type="date" id="endDate" formControlName="endDate">
        </div>
    </form>
    <div class="file-type-selector">
        <button type="button" mat-raised-button [color]="file === 'excel' ? 'primary' : ''" (click)="setFileType('excel')">
            <mat-icon>description</mat-icon> Excel
        </button>
        <button type="button" mat-raised-button [color]="file === 'pdf' ? 'primary' : ''" (click)="setFileType('pdf')">
            <mat-icon>picture_as_pdf</mat-icon> PDF
        </button>
    </div>
    <div class="generate-btn-container">
        @if (file === 'excel'){
            <button type="button" mat-flat-button color="accent" (click)="getExcel()">Generar Excel</button>
        }
        @if (file === 'pdf'){
            <button type="button" mat-flat-button color="accent" (click)="getPDF()">Generar PDF</button>
        }
    </div>
</div>
